services:
  db:
    image: mysql:8
    container_name: mediway-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mediway
      MYSQL_USER: mediway
      MYSQL_PASSWORD: mediwaypass
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  backend:
    build:
      context: ./backend
    container_name: mediway-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/mediway?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: mediway
      SPRING_DATASOURCE_PASSWORD: mediwaypass
      # Optional JVM tuning (override as needed)
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      - db
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_BASE_URL: http://localhost:8080
    container_name: mediway-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:

networks:
  default:
    name: mediway-network