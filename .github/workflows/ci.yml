name: CI

on:
  push:
    branches: [ main, master, feature-improved-ui ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-tests:
    name: Backend Tests (Maven)
    runs-on: ubuntu-latest
    env:
      SPRING_PROFILES_ACTIVE: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache local Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run backend tests
        working-directory: backend
        run: |
          ./mvnw -B -DskipITs test

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports

  frontend-tests:
    name: Frontend Tests (Node)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        # Try the reproducible `npm ci` first; if lockfile mismatch prevents install,
        # fall back to `npm install` so CI can proceed. Long-term: update and commit package-lock.json.
        run: npm ci || npm install

      - name: Run frontend lint
        working-directory: frontend
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present || true
          fi

      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --watchAll=false --silent

      - name: Build frontend
        working-directory: frontend
        run: npm run build --if-present

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  combined-checks:
    name: Combined quick checks
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Print summary
        run: echo "Frontend and Backend jobs completed"

