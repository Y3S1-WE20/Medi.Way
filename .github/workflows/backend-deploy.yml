name: Backend Deploy (manual)

on:
  workflow_dispatch: {}

jobs:
  build-and-push:
    name: Build and push Docker image to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform builds)
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        if: ${{ secrets.GHCR_TOKEN != '' }}
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:latest ./backend

      - name: Push Docker image
        if: ${{ secrets.GHCR_TOKEN != '' }}
        run: |
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Note about missing secrets
        if: ${{ secrets.GHCR_TOKEN == '' }}
        run: |
          echo "GHCR_TOKEN not found. Set repository secret 'GHCR_TOKEN' to enable pushing images."
